<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flight Anomaly Live Monitor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="app-shell">
    <section class="panel map-panel">
        <div class="panel-header">
            <h2>Flight Path & Map Anomalies</h2>
        </div>
        <div id="map"></div>
        <div class="metrics" id="pathMetrics"></div>
    </section>

    <aside class="right-column">
        <section class="panel status-panel">
            <div class="panel-header">
                <h2>Engine & Component Health</h2>
                <div id="engineBadge" class="badge ok">Normal</div>
            </div>
            <div class="metrics" id="engineMetrics"></div>
        </section>

        <section class="panel airspace-panel">
            <div class="panel-header">
                <h2>Airspace Status & Latest News</h2>
                <div id="airspaceBadge" class="badge ok">Normal</div>
            </div>
            <div class="metrics" id="airspaceMetrics"></div>
            <ul id="newsList"></ul>
        </section>
    </aside>
</div>

<section class="utility-window">
    <h3>Live Simulation Utility</h3>
    <div class="controls-grid">
        <label>Route Deviation <input id="route_deviation" type="range" min="0" max="1" step="0.01"></label>
        <label>Engine Stress <input id="engine_stress" type="range" min="0" max="1" step="0.01"></label>
        <label>Weather Severity <input id="weather" type="range" min="0" max="1" step="0.01"></label>
        <label>Airspace Risk <input id="airspace_risk" type="range" min="0" max="1" step="0.01"></label>
    </div>
    <div class="injection-row">
        <label>Engine Temp Spike <input id="engine_temp_delta" type="number" value="0" step="5"></label>
        <label>Vibration Spike <input id="vibration_delta" type="number" value="0" step="0.2"></label>
        <label class="check"><input id="force_airspace_shutdown" type="checkbox"> Force Shutdown Event</label>
    </div>
    <div class="button-row">
        <button id="applyBtn">Apply Changes</button>
        <button id="resetBtn" class="secondary">Reset Simulation</button>
        <a href="{{ url_for('compare_models') }}" class="button-link">Compare Models</a>
        <span id="clock"></span>
    </div>
</section>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
